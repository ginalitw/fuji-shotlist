<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富搖拍攝清單 2026</title>
<style>
  :root{
    --bg:#111318; --card:#1b1e26; --line:#2a2e3a;
    --text:#e8e8ea; --dim:#9a9fad; --accent:#7ec8a9; --warn:#e8b04b;
    --ace:#5aa7e8; --flow:#c58ae0; --go:#e8a05a; --hand:#8a94a8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; padding-bottom:80px;}
  header{position:sticky; top:0; background:rgba(17,19,24,.96); backdrop-filter:blur(6px);
    padding:14px 16px 10px; border-bottom:1px solid var(--line); z-index:10;}
  h1{font-size:18px; margin:0 0 6px;}
  .total{font-size:13px; color:var(--dim);}
  .bar{height:6px; background:var(--line); border-radius:3px; margin-top:8px; overflow:hidden;}
  .bar i{display:block; height:100%; background:var(--accent); width:0%; transition:width .3s;}
  section{margin:14px 12px;}
  .sec-head{display:flex; justify-content:space-between; align-items:baseline;
    padding:4px 4px 8px; cursor:pointer; user-select:none;}
  .sec-head h2{font-size:16px; margin:0; color:var(--accent);}
  .sec-head .cnt{font-size:12px; color:var(--dim);}
  .note{font-size:12px; color:var(--warn); padding:0 4px 8px; line-height:1.5;}
  ul{list-style:none; margin:0; padding:0; background:var(--card);
    border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  li{border-bottom:1px solid var(--line);}
  li:last-child{border-bottom:none;}
  label{display:flex; align-items:flex-start; gap:10px; padding:12px 12px; cursor:pointer;}
  input[type=checkbox]{width:22px; height:22px; margin:1px 0 0; accent-color:var(--accent); flex:none;}
  li.done .txt{color:var(--dim); text-decoration:line-through;}
  .txt{font-size:15px; line-height:1.45;}
  .sub{display:block; font-size:12px; color:var(--dim); margin-top:2px;}
  .tag{display:inline-block; font-size:11px; padding:1px 7px; border-radius:9px;
    margin-left:6px; vertical-align:1px; color:#111; font-weight:600;}
  .tAce{background:var(--ace);} .tFlow{background:var(--flow);}
  .tGo{background:var(--go);} .tHand{background:var(--hand);}
  .collapsed ul,.collapsed .note{display:none;}
  footer{position:fixed; bottom:0; left:0; right:0; display:flex; gap:10px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:rgba(17,19,24,.96); border-top:1px solid var(--line);}
  button{flex:1; padding:10px; font-size:14px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--text);}
</style>
</head>
<body>

  <h1>🎬 富搖拍攝清單 2026</h1>
  <div class="total"><span id="doneN">0</span> / <span id="allN">0</span> 顆完成</div>
  <div class="bar"><i id="totalBar"></i></div>
</header>

<div id="app"></div>

<footer>
  <button onclick="toggleAll()">全部收合/展開</button>
  <button onclick="if(confirm('確定清空所有勾選？')){localStorage.clear();location.reload()}">重設</button>
</footer>

const app=document.getElementById('app');
let total=0;
DATA.forEach((sec,si)=>{
  const s=document.createElement('section'); s.id='sec'+si;
  let lis='';
  sec.items.forEach((it,ii)=>{
    const key='s'+si+'i'+ii; total++;
    const done=localStorage.getItem(key)==='1';
    lis+=`<li class="${done?'done':''}"><label>
      <input type="checkbox" data-k="${key}" ${done?'checked':''}>
      <span class="txt">${it[0]}${it[1]?`<span class="sub">${it[1]}</span>`:''}</span>
    </label></li>`;
  });
  s.innerHTML=`<div class="sec-head" onclick="this.parentNode.classList.toggle('collapsed');save()">
      <h2>${sec.t}</h2><span class="cnt" id="cnt${si}"></span></div>
    ${sec.n?`<div class="note">💡 ${sec.n}</div>`:''}<ul>${lis}</ul>`;
  app.appendChild(s);
});
document.getElementById('allN').textContent=total;

app.addEventListener('change',e=>{
  if(e.target.type!=='checkbox')return;
  localStorage.setItem(e.target.dataset.k, e.target.checked?'1':'0');
  e.target.closest('li').classList.toggle('done', e.target.checked);
  refresh();
});
function refresh(){
  let done=0;
  DATA.forEach((sec,si)=>{
    let d=0;
    sec.items.forEach((_,ii)=>{ if(localStorage.getItem('s'+si+'i'+ii)==='1'){d++;done++;} });
    document.getElementById('cnt'+si).textContent=d+'/'+sec.items.length;
  });
  document.getElementById('doneN').textContent=done;
  document.getElementById('totalBar').style.width=(done/total*100)+'%';
}
function toggleAll(){
  const secs=[...document.querySelectorAll('section')];
  const anyOpen=secs.some(s=>!s.classList.contains('collapsed'));
  secs.forEach(s=>s.classList.toggle('collapsed',anyOpen));
}
function save(){}
refresh();
</script>
